<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Loja Tech | Produtos genéricos</title>
</head>
<body>
<div class="page-wrapper">
    <!-- header with login top right -->
    <div class="store-header">
        <div class="brand">
            <h1>⚡ Loja Genérica</h1>
            <span class="brand-tag">Informática</span>
        </div>
        <button class="login-btn" id="openLoginBtn">
            🔐 Login
        </button>
    </div>

    
    <div>
        <div class="section-title">✨ Produtos ✨</div>
        <div class="products-grid" id="productsContainer">
            <!-- aqui vai ficar a lista de produtos -->
        </div>
    </div>
    <footer>
        🌟 demo
    </footer>
</div>

<!-- login modal (popup) -->
<div id="loginModal" class="modal-overlay">
    <div class="login-modal">
        <h3>🔑 Bem vindo!</h3>
        <p>Conecte-se à sua conta!</p>
        <div class="mock-input">
            📧 fulano@email.com
        </div>
        <div class="mock-input">
            🔒 ••••••••
        </div>
        <div class="demo-note">
            💡 Conecte-se ou cadastre-se para continuar!
        </div>
        <button id="confirmLoginBtn" class="modal-login-action">🚀 Login </button>
        <button id="closeModalBtn" class="close-modal">Cancelar</button>
    </div>
</div>

<!-- toast message for login success -->
<div id="loginToast" class="login-toast">
    ✅ Sucesso no login! (Demo mode)
</div>
